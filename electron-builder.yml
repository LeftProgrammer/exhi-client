appId: com.exhi.client
productName: 智慧展厅客户端
copyright: Copyright © 2026 exhi-team
directories:
  output: build
  buildResources: build-resources
files:
  - out/**/*
  - package.json
  - '!**/node_modules/*/{CHANGELOG.md,README.md,readme.md,readme.txt,*.flow,*.mjs.map}'
  - '!**/node_modules/.package-lock.json'
asar: true
asarUnpack:
  - resources/**
extraResources:
  - from: packages
    to: packages
    filter: ['**/*']
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}
  # 运行时不需要管理员：音量/shutdown 这些 Windows 普通用户即可执行
  # 安装时若要写 Program Files，由 NSIS perMachine + allowElevation 处理
  requestedExecutionLevel: asInvoker
nsis:
  oneClick: false
  perMachine: true
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 智慧展厅客户端
# 配置 generic provider 让 electron-builder 生成 latest.yml（OTA 必需）
# 实际部署的 URL 由 settings.json 的 updateFeedUrl 决定，这里只是占位
publish:
  - provider: generic
    url: https://example.com/exhi-client/${channel}
    channel: stable
    updaterCacheDirName: exhi-client-updater
