<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>触摸交互演示</title>
    <!-- 注入 Runtime 提供的 bridge 脚本，提供 window.exhibitBridge -->
    <script src="exhi-pkg://pkg/__exhi__/bridge.js"></script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(ellipse at top, #1e3a8a 0%, #0a1530 100%);
        color: #fff;
        font-family: 'Microsoft YaHei', sans-serif;
        overflow: hidden;
        user-select: none;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px;
      }
      h1 {
        font-size: 64px;
        margin: 0 0 16px 0;
      }
      .info {
        font-size: 20px;
        opacity: 0.6;
        margin-bottom: 60px;
      }
      .btns {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 24px;
        width: 720px;
      }
      .btn {
        font-size: 28px;
        padding: 32px;
        border: 2px solid rgba(255, 255, 255, 0.25);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.06);
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
      }
      .btn:hover,
      .btn:active {
        background: rgba(255, 255, 255, 0.15);
        border-color: rgba(255, 255, 255, 0.5);
      }
      .log {
        margin-top: 40px;
        height: 200px;
        width: 720px;
        overflow-y: auto;
        font-size: 14px;
        opacity: 0.6;
        font-family: 'Consolas', monospace;
        background: rgba(0, 0, 0, 0.3);
        padding: 12px 16px;
        border-radius: 8px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>触摸交互演示</h1>
      <div class="info">点击按钮通过 exhibitBridge 控制客户端</div>
      <div class="btns">
        <div class="btn" data-scene="welcome">切到 welcome</div>
        <div class="btn" data-scene="image-demo">切到 image-demo</div>
        <div class="btn" data-scene="composite-demo">切到 composite-demo</div>
        <div class="btn" id="emit-btn">埋点 emit</div>
      </div>
      <div class="log" id="log"></div>
    </div>

    <script>
      const logEl = document.getElementById('log')
      function log(msg) {
        const t = new Date().toLocaleTimeString('zh-CN')
        logEl.innerHTML = `[${t}] ${msg}<br>` + logEl.innerHTML
      }

      ;(async () => {
        await window.exhibitBridge.ready
        const info = window.exhibitBridge.getInfo()
        log(`bridge 就绪: display=${info?.displayId} pkg=${info?.packageInfo?.version}`)

        document.querySelectorAll('.btn[data-scene]').forEach((btn) => {
          btn.addEventListener('click', async () => {
            const sceneId = btn.getAttribute('data-scene')
            log(`dispatch cmd.gotoScene sceneId=${sceneId}`)
            const r = await window.exhibitBridge.dispatch({
              type: 'cmd.gotoScene',
              payload: { sceneId }
            })
            log(`→ ${r.ok ? 'ok' : 'fail: ' + r.error}`)
          })
        })

        document.getElementById('emit-btn').addEventListener('click', () => {
          window.exhibitBridge.emit('analytics', {
            action: 'demo-button-click',
            at: Date.now()
          })
          log('emit analytics 已发送，主进程日志可见，evt.bridge 已上报中控')
        })

        // 演示订阅：监听其他屏的场景切换
        window.exhibitBridge.on('scene:changed', (e) => {
          log(`收到 scene:changed: display=${e.displayId} → ${e.sceneId}`)
        })
      })()
    </script>
  </body>
</html>
