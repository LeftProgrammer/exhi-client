<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>欢迎</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0a1530 0%, #1a2f5c 50%, #0f3a7a 100%);
        color: #fff;
        font-family: 'Microsoft YaHei', sans-serif;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      h1 {
        font-size: 96px;
        letter-spacing: 0.2em;
        margin: 0 0 20px 0;
        color: #ffffff;
      }
      h2 {
        font-size: 42px;
        font-weight: 300;
        opacity: 0.85;
        margin: 0 0 80px 0;
        letter-spacing: 0.1em;
      }
      .info {
        font-size: 20px;
        opacity: 0.6;
        margin-top: 80px;
      }
      .pulse {
        width: 12px;
        height: 12px;
        background: #4ade80;
        border-radius: 50%;
        display: inline-block;
        margin-right: 8px;
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
    </style>
  </head>
  <body>
    <h1>智慧展厅客户端</h1>
    <h2>Exhibition Client Runtime v1.0</h2>
    <div class="info">
      <span class="pulse"></span>
      <span id="status">M1 骨架运行中</span>
    </div>
    <div class="info" id="boot-info" style="font-size: 14px; margin-top: 20px;"></div>

    <script>
      // 简单 demo：尝试读取 bridge 信息显示
      window.addEventListener('load', () => {
        const info = document.getElementById('boot-info')
        const meta = {
          UA: navigator.userAgent.includes('Electron') ? 'Electron OK' : 'Browser',
          resolution: window.innerWidth + 'x' + window.innerHeight,
          time: new Date().toLocaleString('zh-CN')
        }
        info.textContent = JSON.stringify(meta)
      })
    </script>
  </body>
</html>
