<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1828"/>
      <stop offset="0.6" stop-color="#0e253b"/>
      <stop offset="1" stop-color="#08182a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="rgba(0,229,212,0.18)"/>
      <stop offset="1" stop-color="rgba(0,229,212,0)"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <ellipse cx="960" cy="540" rx="900" ry="500" fill="url(#glow)"/>
  <!-- 远山 -->
  <path d="M0,720 L160,640 L320,700 L500,560 L680,680 L880,580 L1080,720 L1280,620 L1480,700 L1680,640 L1920,720 L1920,1080 L0,1080 Z" fill="#0c1f33" opacity="0.85"/>
  <!-- 近山 -->
  <path d="M0,820 L200,740 L420,820 L640,720 L880,820 L1100,760 L1320,820 L1560,760 L1920,820 L1920,1080 L0,1080 Z" fill="#091625" opacity="0.95"/>
  <!-- 江面（弱反光） -->
  <rect y="900" width="1920" height="180" fill="#04101a"/>
  <line x1="0" y1="920" x2="1920" y2="920" stroke="rgba(0,229,212,0.15)" stroke-width="1"/>
  <line x1="0" y1="980" x2="1920" y2="980" stroke="rgba(0,229,212,0.08)" stroke-width="1"/>
</svg>
